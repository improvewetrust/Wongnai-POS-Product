  green: {bg:'bg-wongnai-green', text:'text-wongnai-green',ring:'border-wongnai-green',soft:'bg-wongnai-light',accent:'#6AAB27'},

  purple:{bg:'bg-accent-purple', text:'text-accent-purple',ring:'border-accent-purple',soft:'bg-purple-50', accent:'#7C5CD4'},
  pink:  {bg:'bg-accent-pink',   text:'text-accent-pink',  ring:'border-accent-pink',  soft:'bg-pink-50',   accent:'#D4478A'},

/* ═══════════════ STATE (localStorage) ═══════════════ */
const LS_KEY = 'mds-guide-checks';
let checks = {};
try { checks = JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch(e){ checks = {}; }
function saveChecks(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(checks)); }catch(e){} }
function itemKey(topicId, si, ii){ return `${topicId}.${si}.${ii}`; }

let activeTopic = TOPICS[0].id;

/* ═══════════════ HELPERS ═══════════════ */
const root = document.getElementById('root');
function topicProgress(t){
  let total=0, done=0;
  t.sections.forEach((s,si)=> s.items.forEach((_,ii)=>{ total++; if(checks[itemKey(t.id,si,ii)]) done++; }));
  return { total, done, pct: total? Math.round(done/total*100):0 };
}

      </div>

    อ้างอิง: [L&amp;D Master] MDS Knowledge Base · Flow DEPA จาก DEPA × Wongnai POS Sales Hub
  </footer>`;

  document.getElementById('resetBtn').onclick = ()=>{
    if(confirm('ล้างเครื่องหมายถูกทั้งหมด?')){ checks={}; saveChecks(); render(); }
  };
  renderTabs();
  renderContent();
}

function renderTabs(){
  const list = document.getElementById('tabList');
  list.innerHTML='';
  TOPICS.forEach(t=>{
    const c = COLORS[t.color];
    const p = topicProgress(t);
    const on = activeTopic===t.id;
    const tab = document.createElement('button');
    tab.className = `flex-shrink-0 md:w-full text-left px-3.5 py-3 rounded-xl border-2 transition-all flex items-center gap-2.5
      ${on ? c.ring+' '+c.soft+' shadow-sm' : 'border-gray-200 bg-white hover:border-gray-300'}`;
    tab.innerHTML = `
      <span class="w-9 h-9 ${on?c.bg:'bg-gray-100'} ${on?'text-white':''} rounded-lg flex items-center justify-center text-lg flex-shrink-0">${t.icon}</span>
      <div class="min-w-0">
        <div class="font-bold text-sm ${on?c.text:'text-gray-700'} whitespace-nowrap md:whitespace-normal">${t.name}</div>
        <div class="hidden md:flex items-center gap-1.5 mt-1">
          <div class="flex-1 h-1 bg-gray-200 rounded-full overflow-hidden"><div class="h-full rounded-full" style="width:${p.pct}%;background:${c.accent}"></div></div>
          <span class="text-[10px] text-gray-400">${p.done}/${p.total}</span>
        </div>
      </div>`;
    tab.onclick = ()=>{ activeTopic=t.id; renderTabs(); renderContent(); window.scrollTo({top:0,behavior:'smooth'}); };
    list.appendChild(tab);
  });
}

          <div class="flex-1 min-w-0">
            <h2 class="font-black text-xl text-gray-800">${t.name}</h2>
            <p class="text-xs font-semibold ${c.text} mb-1">${t.sub}</p>
            <p class="text-sm text-gray-500 leading-relaxed">${t.note}</p>

      const key = itemKey(t.id, si, ii);

        ${checks[key] ? c.soft+' '+c.ring : 'border-gray-100 hover:bg-gray-50'}`;
      label.innerHTML = `
        <input type="checkbox" class="chk mt-0.5 w-4 h-4 flex-shrink-0" ${checks[key]?'checked':''}
          style="accent-color:${c.accent}">
        <span class="text-sm text-gray-700 leading-relaxed">${item}</span>`;
      const cb = label.querySelector('input');
      cb.onchange = ()=>{ checks[key]=cb.checked; if(!cb.checked) delete checks[key]; saveChecks(); renderTabs(); renderContent(); };
      ul.appendChild(label);
    });
    card.appendChild(ul);
    secWrap.appendChild(card);
  });
}

render();
</script>
</body>
</html>
