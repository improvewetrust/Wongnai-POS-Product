const root=document.getElementById('root');

function topicById(id){return DATA.topics.find(t=>t.id===id)}
function progress(t){let tot=0,dn=0;const items=t.mode==='steps'?t.steps:t.sections.flatMap(s=>s.items);
 (t.mode==='steps'?t.steps:t.sections.flatMap(s=>s.items)).forEach((_,i)=>{tot++;});
 // count via keys
 tot=0;dn=0;
 if(t.mode==='steps'){t.steps.forEach((_,i)=>{tot++;if(checks[t.id+'.'+i])dn++})}
 else{let idx=0;t.sections.forEach(s=>s.items.forEach(()=>{if(checks[t.id+'.'+idx])dn++;idx++;tot++}))}
 return{tot,dn,pct:tot?Math.round(dn/tot*100):0}}

function render(){
 root.innerHTML=`
 <header class="bg-wongnai-dark text-white sticky top-0 z-30 shadow-lg">
   <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-3">
     <div class="w-9 h-9 bg-wongnai-green rounded-lg flex items-center justify-center font-black flex-shrink-0">W</div>
     <div class="flex-1 min-w-0"><h1 class="font-bold text-base leading-tight">MDS Sales Guide · End To End</h1>
     <p class="text-xs text-green-300 truncate">คู่มือขั้นตอนการขาย Wongnai POS · เช็กลิสต์ทีม MDS</p></div>
     <button id="reset" class="text-xs bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg flex-shrink-0">↺ ล้าง</button>
   </div>
 </header>
 <div class="max-w-6xl mx-auto px-4 py-5 flex flex-col md:flex-row gap-5">
   <aside class="md:w-60 flex-shrink-0"><div id="tabs" class="flex md:flex-col gap-2 overflow-x-auto md:overflow-visible pb-2 md:pb-0 md:sticky md:top-20"></div></aside>
   <main id="content" class="flex-1 min-w-0"></main>
 </div>
 <footer class="text-center text-xs text-gray-400 py-8 px-4">MDS Sales Guide · จัดทำเพื่อการเรียนรู้ภายในทีม<br>
 อ้างอิงเนื้อหาจาก: [AE-MDS] End To End (Tab ETE) · Flow DEPA จาก DEPA × Wongnai POS Sales Hub</footer>`;
 document.getElementById('reset').onclick=()=>{if(confirm('ล้างเครื่องหมายถูกทั้งหมด?')){checks={};save();render()}};
 renderTabs();renderContent();
}

function renderTabs(){
 const list=document.getElementById('tabs');list.innerHTML='';
 DATA.topics.forEach(t=>{
  const c=COLORS[t.color],p=progress(t),on=active===t.id;
  const b=document.createElement('button');
  b.className=`flex-shrink-0 md:w-full text-left px-3.5 py-3 rounded-xl border-2 transition-all flex items-center gap-2.5 ${on?c.ring+' '+c.soft+' shadow-sm':'border-gray-200 bg-white hover:border-gray-300'}`;
  b.innerHTML=`<span class="w-9 h-9 ${on?c.bg+' text-white':'bg-gray-100'} rounded-lg flex items-center justify-center text-lg flex-shrink-0">${t.icon}</span>
   <div class="min-w-0"><div class="font-bold text-sm ${on?c.text:'text-gray-700'} whitespace-nowrap md:whitespace-normal">${t.name}</div>
   <div class="hidden md:flex items-center gap-1.5 mt-1"><div class="flex-1 h-1 bg-gray-200 rounded-full overflow-hidden"><div class="h-full rounded-full" style="width:${p.pct}%;background:${c.accent}"></div></div><span class="text-[10px] text-gray-400">${p.dn}/${p.tot}</span></div></div>`;
  b.onclick=()=>{active=t.id;renderTabs();renderContent();window.scrollTo({top:0,behavior:'smooth'})};
  list.appendChild(b);
 });
 // scenario tab
 const on=active===SCEN;
 const b=document.createElement('button');
 b.className=`flex-shrink-0 md:w-full text-left px-3.5 py-3 rounded-xl border-2 transition-all flex items-center gap-2.5 ${on?'border-wongnai-dark bg-wongnai-msg shadow-sm':'border-gray-200 bg-white hover:border-gray-300'}`;
 b.innerHTML=`<span class="w-9 h-9 ${on?'bg-wongnai-dark text-white':'bg-gray-100'} rounded-lg flex items-center justify-center text-lg flex-shrink-0">🎬</span>
  <div class="min-w-0"><div class="font-bold text-sm ${on?'text-wongnai-dark':'text-gray-700'} whitespace-nowrap md:whitespace-normal">สถานการณ์การขายจริง</div>
  <div class="hidden md:block text-[10px] text-gray-400 mt-1">ตัวอย่าง + ข้อความ LINE</div></div>`;
 b.onclick=()=>{active=SCEN;renderTabs();renderContent();window.scrollTo({top:0,behavior:'smooth'})};
 list.appendChild(b);
}

function stepCard(t,st,i){
 const c=COLORS[t.color];
 const key=t.id+'.'+i;
 const done=!!checks[key];
 const title=(st.detail||st.cat||'').split('\n')[0];
 const wrap=document.createElement('div');
 wrap.className=`bg-white rounded-2xl border ${done?c.ring:'border-gray-200'} shadow-sm overflow-hidden`;
 const sideq=st.quest==='Side Quest';
 wrap.innerHTML=`
  <div class="flex items-start gap-3 p-4">
    <input type="checkbox" class="chk mt-1.5 w-4 h-4 flex-shrink-0" ${done?'checked':''} style="accent-color:${c.accent}">
    <button class="head flex-1 min-w-0 text-left">
      <div class="flex items-center gap-2 flex-wrap mb-1">
        <span class="w-7 h-7 ${c.bg} text-white rounded-lg flex items-center justify-center text-xs font-bold flex-shrink-0">${esc(st.step).replace('.0','')}</span>
        <span class="text-[11px] px-1.5 py-0.5 rounded ${sideq?'bg-amber-100 text-amber-700':c.soft+' '+c.text} font-semibold">${sideq?'Side Quest':'Main Quest'}</span>
        <span class="text-[11px] text-gray-500">${SYS[st.system]||'•'} ${esc(st.system)}</span>
        <span class="text-[11px] px-1.5 py-0.5 rounded bg-gray-100 text-gray-600">${esc(st.cat)}</span>
        ${st.contact?'<span class="text-[11px] px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 font-semibold">💬 ติดต่อลูกค้า</span>':''}
      </div>
      <div class="text-sm text-gray-800 font-medium wl">${esc(title)}</div>
    </button>
    <span class="chev text-gray-400 flex-shrink-0 pt-1">▾</span>
  </div>
  <div class="detail hidden px-4 pb-4 pl-11">
    <div class="text-sm text-gray-700 wl border-l-2 ${c.ring} pl-3 mb-3">${esc(st.detail)}</div>
    ${st.remark?`<div class="text-xs bg-amber-50 border border-amber-200 text-amber-800 rounded-lg p-2.5 mb-3 wl"><b>📌 หมายเหตุ:</b> ${esc(st.remark)} ${st.remarkLink?linkBtn('เปิดลิงก์',st.remarkLink,'bg-amber-100 text-amber-800'):''}</div>`:''}
    <div class="flex flex-wrap gap-2">
      ${st.manualLink?linkBtn(st.manual||'คู่มือ',st.manualLink,c.soft+' '+c.text):''}
      ${st.detailLink?linkBtn('เอกสารประกอบ',st.detailLink,'bg-gray-100 text-gray-600'):''}
      ${st.lineTemplate?`<button class="gotoScen inline-flex items-center gap-1 text-xs font-semibold px-2.5 py-1 rounded-lg bg-wongnai-msg text-wongnai-dark hover:opacity-80">💬 ตัวอย่างข้อความ LINE</button>`:''}
    </div>
  </div>`;
 const cb=wrap.querySelector('.chk');
 cb.onchange=()=>{checks[key]=cb.checked;if(!cb.checked)delete checks[key];save();renderTabs();
   wrap.classList.toggle('border-gray-200',!cb.checked);};
 const det=wrap.querySelector('.detail'),chev=wrap.querySelector('.chev');
 wrap.querySelector('.head').onclick=()=>{det.classList.toggle('hidden');chev.style.transform=det.classList.contains('hidden')?'':'rotate(180deg)'};
 const gs=wrap.querySelector('.gotoScen');if(gs)gs.onclick=()=>{active=SCEN;renderTabs();renderContent();window.scrollTo({top:0,behavior:'smooth'})};
 return wrap;
}

function renderContent(){
 if(active===SCEN)return renderScenario();
 const t=topicById(active),c=COLORS[t.color],p=progress(t);
 const box=document.getElementById('content');
 box.innerHTML=`<div class="fade-in">
   <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 mb-4">
     <div class="flex items-start gap-3">
       <span class="w-12 h-12 ${c.bg} text-white rounded-xl flex items-center justify-center text-2xl flex-shrink-0">${t.icon}</span>
       <div class="flex-1 min-w-0"><h2 class="font-black text-xl text-gray-800">${t.name}</h2>
       <p class="text-xs font-semibold ${c.text}">${esc(t.sub)}</p></div>
     </div>
     ${(t.notes&&t.notes.length)?`<div class="mt-3 space-y-1.5">${t.notes.map(n=>`<div class="text-xs bg-gray-50 border border-gray-200 rounded-lg p-2.5 text-gray-600 wl">💡 ${esc(n.text)} ${n.link?linkBtn('เปิด',n.link,c.soft+' '+c.text):''}</div>`).join('')}</div>`:''}
     <div class="mt-4 flex items-center gap-3"><div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden"><div class="h-full rounded-full" style="width:${p.pct}%;background:${c.accent}"></div></div><span class="text-xs font-bold ${c.text}">${p.pct}%</span></div>
   </div>
   <div id="body" class="space-y-3"></div>
 </div>`;
 const body=document.getElementById('body');
 if(t.mode==='steps'){
   t.steps.forEach((st,i)=>body.appendChild(stepCard(t,st,i)));
   if(t.resources&&t.resources.length){
     const r=document.createElement('div');r.className='bg-white rounded-2xl border border-gray-200 shadow-sm p-5 mt-2';
     r.innerHTML=`<h3 class="font-bold text-gray-800 mb-3">🔧 แหล่งข้อมูล / เครื่องมือเพิ่มเติม</h3>
      <div class="space-y-2">${t.resources.map(x=>`<div class="flex items-center justify-between gap-2 text-sm"><span class="text-gray-600 wl">${esc(x.label)}</span>${x.link?linkBtn(x.text,x.link,c.soft+' '+c.text):esc(x.text)}</div>`).join('')}</div>`;
     body.appendChild(r);
   }
 } else {
   let idx=0;
   t.sections.forEach(s=>{
     const card=document.createElement('div');card.className='bg-white rounded-2xl border border-gray-200 shadow-sm p-5';
     card.innerHTML=`<h3 class="font-bold text-gray-800 mb-3">${esc(s.title)}</h3>`;
     const ul=document.createElement('div');ul.className='space-y-2';
     s.items.forEach(item=>{const key=t.id+'.'+idx;const lab=document.createElement('label');
       lab.className=`flex items-start gap-3 p-2.5 rounded-xl border cursor-pointer ${checks[key]?c.soft+' '+c.ring:'border-gray-100 hover:bg-gray-50'}`;
       lab.innerHTML=`<input type="checkbox" class="chk mt-0.5 w-4 h-4 flex-shrink-0" ${checks[key]?'checked':''} style="accent-color:${c.accent}"><span class="text-sm text-gray-700 wl">${esc(item)}</span>`;
       const cb=lab.querySelector('input');const k=key;cb.onchange=()=>{checks[k]=cb.checked;if(!cb.checked)delete checks[k];save();renderTabs();renderContent()};
       ul.appendChild(lab);idx++;});
     card.appendChild(ul);body.appendChild(card);
   });
 }
}

function copyBtn(text){
 return `<button class="copy text-xs bg-wongnai-green text-white font-semibold px-3 py-1.5 rounded-lg hover:bg-green-600" data-copy="${encodeURIComponent(text)}">📋 คัดลอก</button>`;
}

function renderScenario(){
 const box=document.getElementById('content');
 const tpls=DATA.lineChat;
 const bySec=s=>tpls.filter(t=>t.section===s);
 const tplCard=t=>`
   <div class="bg-white rounded-xl border border-gray-200 p-4">
     <div class="flex items-center justify-between mb-2"><span class="text-xs font-bold text-wongnai-dark">ข้อความที่ ${esc(t.no).replace('.0','')}</span>${copyBtn(t.text)}</div>
     <div class="text-sm text-gray-700 wl bg-gray-50 rounded-lg p-3 border border-gray-100">${esc(t.text)}</div>
     ${t.remark?`<p class="text-xs text-amber-700 mt-2 wl">📌 ${esc(t.remark)}</p>`:''}
     ${(t.ex1.text||t.ex2.text)?`<div class="flex flex-wrap gap-2 mt-2">
        ${t.ex1.link?linkBtn('ดูตัวอย่าง: '+(t.ex1.text.split('\n')[0]),t.ex1.link,'bg-blue-50 text-blue-700'):''}
        ${t.ex2.link?linkBtn('ดูตัวอย่าง: '+(t.ex2.text.split('\n')[0]),t.ex2.link,'bg-blue-50 text-blue-700'):''}
      </div>`:''}
   </div>`;
 box.innerHTML=`<div class="fade-in space-y-4">
   <div class="bg-wongnai-dark text-white rounded-2xl p-5">
     <h2 class="font-black text-xl">🎬 สถานการณ์การขายจริง</h2>
     <p class="text-sm text-green-200 mt-1">ตัวอย่างเดินเรื่องหลังปิดการขาย — ทำอะไร ส่งข้อความอะไร ขอเอกสารอะไร พร้อมตัวอย่างให้กดดู</p>
   </div>

   <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5">
     <h3 class="font-bold text-gray-800 mb-2">🏪 ร้านตัวอย่าง (สมมติ)</h3>
     <div class="text-sm text-gray-700 space-y-1">
       <p><b>ร้าน:</b> ก๋วยเตี๋ยวเรือป้าแดง (สาขาลาดพร้าว)</p>
       <p><b>สินค้าที่ปิดการขาย:</b> POS ซื้อขาด 1 เครื่อง + LINE PAY (POSPAY) + สมัคร GP LINE MAN</p>
       <p><b>ประเภท:</b> บุคคลธรรมดา · <b>วันเปิดใช้งาน:</b> อีก 10 วัน</p>
       <p class="text-xs text-gray-400 mt-1">* เป็นร้านสมมติเพื่อการสอน ไม่ใช่ข้อมูลลูกค้าจริง</p>
     </div>
   </div>

   <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5">
     <h3 class="font-bold text-gray-800 mb-3">✅ หลังปิดการขาย ทำตามลำดับนี้</h3>
     <ol class="space-y-2 text-sm text-gray-700 list-decimal pl-5">
       <li>ขอ<b>ข้อมูลเบื้องต้น</b>ของร้านจากลูกค้า (ดูข้อความที่ 1)</li>
       <li>ขอ<b>เอกสาร</b>เพื่อเปิดใบเสนอราคา (ดูข้อความที่ 2 + ตัวอย่างเอกสาร)</li>
       <li>เปิด <b>Opportunity ใน Salesforce</b> → ใส่สินค้า → ออก Quotation (ดูแท็บ POS/LINE PAY/GP)</li>
       <li>ส่ง<b>ใบเสนอราคา + เอกสารสมัคร</b> ให้ลูกค้าเซ็นและชำระเงิน (ดูข้อความที่ 3–4)</li>
       <li>แนบเอกสารใน SF → Validate SO → ปิดการขาย</li>
       <li>แจ้ง<b>การจัดส่ง + นัดติดตั้ง</b> (ดูข้อความที่ 7)</li>
     </ol>
   </div>

   <div><h3 class="font-black text-lg text-gray-800 mb-1">💬 ข้อความ LINE ที่ต้องส่งหาร้าน</h3>
   <p class="text-sm text-gray-500 mb-3">กด "คัดลอก" แล้ววางในแชท LINE ของลูกค้า (อย่าลืมแทนที่ (ชื่อลูกค้า) และตัวเลข)</p></div>

   <div class="space-y-3">
     <div class="text-sm font-bold text-wongnai-green">📦 POS + LINE PAY</div>
     ${bySec('POS').map(tplCard).join('')}
     <div class="text-sm font-bold text-accent-orange mt-4">🛵 GP LINE MAN</div>
     ${bySec('GP').map(tplCard).join('')}
     <div class="text-sm font-bold text-accent-blue mt-4">📱 POS Subscription (เช่ารายวัน)</div>
     ${bySec('Sub').map(tplCard).join('')}
   </div>
 </div>`;
 box.querySelectorAll('.copy').forEach(b=>b.onclick=()=>{
   const txt=decodeURIComponent(b.dataset.copy);
   navigator.clipboard.writeText(txt).then(()=>{const o=b.innerHTML;b.innerHTML='✓ คัดลอกแล้ว';setTimeout(()=>b.innerHTML=o,1500)});
 });
}

render();
</script>
</body>
</html>
